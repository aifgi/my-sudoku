name: Build App

on:
  workflow_call:
    inputs:
      version:
        type: string
        default: ''
      package-version:
        type: string
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-path: app/build/compose/binaries/main/msi
            artifact-name: sudoku-msi
          - os: macos-14
            task: packageDmg
            artifact-path: app/build/compose/binaries/main/dmg
            artifact-name: sudoku-dmg
          - os: ubuntu-22.04
            task: packageDeb
            artifact-path: app/build/compose/binaries/main/deb
            artifact-name: sudoku-deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Install WiX Toolset (Windows only)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Build and test
        run: >
          ./gradlew :engine:test :app:${{ matrix.task }}
          ${{ inputs.package-version != '' && format('-PpackageVersion={0}', inputs.package-version) || '' }}

      - name: Rename artifacts to real version
        if: inputs.version != '' && inputs.version != inputs.package-version
        shell: bash
        run: |
          find "${{ matrix.artifact-path }}" -type f | while read -r f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newbase="${base/${{ inputs.package-version }}/${{ inputs.version }}}"
            if [ "$base" != "$newbase" ]; then
              mv "$f" "$dir/$newbase"
            fi
          done

      - name: Upload jpackage logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jpackage-logs-${{ matrix.os }}
          path: app/build/compose/logs/
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error