name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-path: app/build/compose/binaries/main/msi
            artifact-name: sudoku-msi
          - os: macos-14
            task: packageDmg
            artifact-path: app/build/compose/binaries/main/dmg
            artifact-name: sudoku-dmg
          - os: ubuntu-22.04
            task: packageDeb
            artifact-path: app/build/compose/binaries/main/deb
            artifact-name: sudoku-deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install WiX Toolset (Windows only)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Build and test
        run: ./gradlew :engine:test :app:${{ matrix.task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
