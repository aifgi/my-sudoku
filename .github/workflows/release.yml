name: Release

on:
  push:
    tags:
      - 'release-*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-path: app/build/compose/binaries/main/msi
            artifact-name: sudoku-msi
          - os: macos-14
            task: packageDmg
            artifact-path: app/build/compose/binaries/main/dmg
            artifact-name: sudoku-dmg
          - os: ubuntu-22.04
            task: packageDeb
            artifact-path: app/build/compose/binaries/main/deb
            artifact-name: sudoku-deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/release-}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Install WiX Toolset (Windows only)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Build
        run: ./gradlew :app:${{ matrix.task }} -PpackageVersion=${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/release-}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/**/*